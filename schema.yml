openapi: 3.0.3
info:
  title: MagicTale API API
  version: 1.0.0
  description: API documentation for MagicTale.
paths:
  /api/ai/generation-options/:
    get:
      operationId: ai_generation_options_retrieve
      tags:
      - ai
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationOptionsResponse'
          description: ''
  /api/ai/stories/:
    get:
      operationId: ai_stories_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - ai
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStoryProjectListList'
          description: ''
    post:
      operationId: ai_stories_create
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryProjectCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StoryProjectCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StoryProjectCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryProjectCreate'
          description: ''
  /api/ai/stories/{id}/:
    get:
      operationId: ai_stories_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this story project.
        required: true
      tags:
      - ai
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryProjectDetail'
          description: ''
    put:
      operationId: ai_stories_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this story project.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryProjectDetailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StoryProjectDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StoryProjectDetailRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryProjectDetail'
          description: ''
    patch:
      operationId: ai_stories_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this story project.
        required: true
      tags:
      - ai
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedStoryProjectDetailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStoryProjectDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStoryProjectDetailRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryProjectDetail'
          description: ''
    delete:
      operationId: ai_stories_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this story project.
        required: true
      tags:
      - ai
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/ai/stories/{id}/cancel/:
    post:
      operationId: ai_stories_cancel_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this story project.
        required: true
      tags:
      - ai
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryProjectDetail'
          description: ''
  /api/ai/stories/{id}/choices/:
    get:
      operationId: ai_stories_choices_list
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this story project.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - ai
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedThemeChoicesList'
          description: ''
        '404':
          description: Theme choices not found.
  /api/ai/stories/{id}/save-to-library/:
    post:
      operationId: ai_stories_save_to_library_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this story project.
        required: true
      tags:
      - ai
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: Story saved to library.
        '400':
          description: Story cannot be saved.
  /api/ai/stories/latest/:
    get:
      operationId: ai_stories_latest_retrieve
      tags:
      - ai
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryProjectDetail'
          description: ''
        '404':
          description: No stories found.
  /api/auth/activity-log/:
    get:
      operationId: auth_activity_log_list
      tags:
      - auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserActivityLog'
          description: ''
  /api/auth/apple/:
    post:
      operationId: auth_apple_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppleLoginRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppleLoginRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppleLoginRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleLoginResponse'
          description: ''
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/auth/delete-account/:
    delete:
      operationId: auth_delete_account_destroy
      tags:
      - auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: Account deleted successfully.
  /api/auth/devices/register/:
    post:
      operationId: auth_devices_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FCMDeviceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FCMDeviceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FCMDeviceRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: Device registered successfully.
        '400':
          description: Validation errors.
  /api/auth/google/:
    post:
      operationId: auth_google_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleLoginResponse'
          description: ''
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/auth/login/:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MyTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MyTokenObtainPairRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyTokenObtainPair'
          description: ''
  /api/auth/login/refresh/:
    post:
      operationId: auth_login_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: |-
        Takes a token and blacklists it. Must be used with the
        `rest_framework_simplejwt.token_blacklist` app installed.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenBlacklistRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/password-reset/:
    post:
      operationId: auth_password_reset_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: If an account exists, a reset link has been sent.
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      tags:
      - auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
          description: ''
        '404':
          description: User profile not found.
    put:
      operationId: auth_profile_update
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnifiedProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UnifiedProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UnifiedProfileUpdateRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: Profile updated successfully.
        '400':
          description: Validation errors.
        '404':
          description: User profile not found.
  /api/auth/resend-verification/:
    post:
      operationId: auth_resend_verification_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: Verification email has been resent.
        '400':
          description: Account already active or validation errors.
        '404':
          description: User not found.
  /api/auth/signup/:
    post:
      operationId: auth_signup_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SignupRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SignupRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '201':
          description: User created successfully. Please check your email for verification.
        '400':
          description: Validation errors.
  /api/dashboard/languages/:
    get:
      operationId: dashboard_languages_list
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LanguageOption'
          description: ''
  /api/dashboard/profile/:
    get:
      operationId: dashboard_profile_retrieve
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
          description: ''
    put:
      operationId: dashboard_profile_update
      tags:
      - dashboard
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminProfileUpdateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProfileUpdateRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
          description: ''
        '400':
          description: Validation errors.
  /api/dashboard/reports/:
    get:
      operationId: dashboard_reports_retrieve
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsResponse'
          description: ''
  /api/dashboard/settings/:
    get:
      operationId: dashboard_settings_retrieve
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteSettings'
          description: ''
    put:
      operationId: dashboard_settings_update
      tags:
      - dashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteSettingsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SiteSettingsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SiteSettingsRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteSettings'
          description: ''
    patch:
      operationId: dashboard_settings_partial_update
      tags:
      - dashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSiteSettingsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedSiteSettingsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedSiteSettingsRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteSettings'
          description: ''
  /api/dashboard/stats/:
    get:
      operationId: dashboard_stats_retrieve
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStatsResponse'
          description: ''
  /api/dashboard/subscriptions/:
    get:
      operationId: dashboard_subscriptions_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSubscriptionManagementList'
          description: ''
  /api/dashboard/timezones/:
    get:
      operationId: dashboard_timezones_retrieve
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
          description: List of available Timezones
  /api/dashboard/users/:
    get:
      operationId: dashboard_users_list
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDashboardUserList'
          description: ''
    post:
      operationId: dashboard_users_create
      tags:
      - dashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DashboardUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DashboardUserRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardUser'
          description: ''
  /api/dashboard/users/{id}/:
    get:
      operationId: dashboard_users_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardUser'
          description: ''
    put:
      operationId: dashboard_users_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - dashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DashboardUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DashboardUserRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardUser'
          description: ''
    patch:
      operationId: dashboard_users_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - dashboard
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDashboardUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDashboardUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDashboardUserRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardUser'
          description: ''
    delete:
      operationId: dashboard_users_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/dashboard/users/{id}/approve/:
    post:
      operationId: dashboard_users_approve_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: User approved and notified successfully.
        '400':
          description: User is already active.
  /api/dashboard/users/{id}/deactivate/:
    post:
      operationId: dashboard_users_deactivate_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: User has been deactivated.
  /api/dashboard/users/{id}/deny/:
    post:
      operationId: dashboard_users_deny_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - dashboard
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: User denied and deleted.
  /api/notifications/:
    get:
      operationId: notifications_list
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: ID of the notification
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - notifications
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
