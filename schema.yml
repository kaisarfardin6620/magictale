components:
  schemas:
    AdminLegalDocumentRequestRequest:
      type: object
      properties:
        doc_type:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        version:
          type: string
          minLength: 1
      required:
      - doc_type
    AdminProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        phone_number:
          type: string
          readOnly: true
        profile_picture_url:
          type: string
          readOnly: true
      required:
      - id
      - phone_number
      - profile_picture_url
    AdminProfileUpdateRequest:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        phone_number:
          type: string
        profile_picture:
          type: string
          format: binary
          writeOnly: true
          nullable: true
    AnalyticsResponse:
      type: object
      properties:
        user_growth_over_time:
          type: array
          items:
            type: object
            additionalProperties: {}
        stories_created_over_time:
          type: array
          items:
            type: object
            additionalProperties: {}
        top_performing_stories:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - stories_created_over_time
      - top_performing_stories
      - user_growth_over_time
    AppleLoginRequestRequest:
      type: object
      properties:
        id_token:
          type: string
          minLength: 1
        email:
          type: string
          nullable: true
          minLength: 1
      required:
      - id_token
    AppleLoginResponse:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
      required:
      - access
      - refresh
    ArtStyleOption:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        image_url:
          type: string
      required:
      - description
      - id
      - image_url
      - name
    DashboardStatsResponse:
      type: object
      properties:
        stats:
          type: object
          additionalProperties: {}
        recent_signups:
          type: object
          additionalProperties: {}
        recent_stories:
          type: object
          additionalProperties: {}
      required:
      - recent_signups
      - recent_stories
      - stats
    DashboardUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        profile_picture_url:
          type: string
          readOnly: true
        name:
          type: string
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        date:
          type: string
          format: date-time
        plan:
          type: string
          readOnly: true
          default: Free
      required:
      - date
      - id
      - name
      - plan
      - profile_picture_url
    DashboardUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        date:
          type: string
          format: date-time
      required:
      - date
      - name
    DocTypeEnum:
      enum:
      - privacy_policy
      - terms_conditions
      type: string
      description: |-
        * `privacy_policy` - Privacy Policy
        * `terms_conditions` - Terms and Conditions
    FCMDeviceRequest:
      type: object
      properties:
        registration_id:
          type: string
          minLength: 1
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          default: web
      required:
      - registration_id
    GenerationOptionsResponse:
      type: object
      properties:
        themes:
          type: array
          items:
            $ref: '#/components/schemas/ThemeOption'
        art_styles:
          type: array
          items:
            $ref: '#/components/schemas/ArtStyleOption'
        narrator_voices:
          type: array
          items:
            $ref: '#/components/schemas/VoiceOption'
      required:
      - art_styles
      - narrator_voices
      - themes
    GoogleLoginRequestRequest:
      type: object
      properties:
        id_token:
          type: string
          minLength: 1
      required:
      - id_token
    GoogleLoginResponse:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
      required:
      - access
      - refresh
    Hero:
      type: object
      properties:
        child_name:
          type: string
          nullable: true
          maxLength: 100
        age:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
        pronouns:
          type: string
          nullable: true
          maxLength: 50
        favorite_animal:
          type: string
          nullable: true
          maxLength: 100
        favorite_color:
          type: string
          nullable: true
          maxLength: 50
    HeroRequest:
      type: object
      properties:
