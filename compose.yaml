services:
  db-migrator:
    build:
      context: .
    env_file: ./.env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/Magictale
    command: ["python", "manage.py", "migrate", "--noinput"]
    depends_on:
      - pgbouncer
      - redis-cache
    volumes:
      - .:/app
    networks:
      - backend

  python-app:
    build:
      context: .
    restart: unless-stopped
    init: true
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        order: start-first
    env_file: ./.env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/Magictale
    entrypoint: /usr/local/bin/docker-entrypoint.sh
    command: ["gunicorn", "magictale.asgi:application", "-k", "uvicorn.workers.UvicornWorker", "-w", "4", "-b", "0.0.0.0:8000"]
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      redis-cache:
        condition: service_started
      pgbouncer:
        condition: service_started
    networks:
      - backend

  celery-worker:
    build:
      context: .
    restart: unless-stopped
    init: true
    deploy:
      replicas: 3
    env_file: ./.env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/Magictale
    command: ["celery", "-A", "magictale", "worker", "--loglevel=info", "--max-tasks-per-child=10", "--concurrency=4"]
    volumes:
      - .:/app
      - media_volume:/app/media
    depends_on:
      - redis-cache
      - pgbouncer
    networks:
      - backend

  celery-beat:
    build:
      context: .
    restart: unless-stopped
    init: true
    deploy:
      replicas: 1
    env_file: ./.env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/Magictale
    command: ["celery", "-A", "magictale", "beat", "--loglevel=info"]
    volumes:
      - .:/app
    depends_on:
      - redis-cache
      - pgbouncer
    networks:
      - backend

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASES=Magictale = host=host.docker.internal port=5432 auth_user=${DB_USER} password=${DB_PASSWORD}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=20
      - AUTH_TYPE=scram-sha-256
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8040:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - python-app
    networks:
      - backend

  redis-cache:
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

volumes:
  static_volume:
  media_volume:
  redis_data:

networks:
  backend:
    driver: bridge